<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="./assets/images/favicon-32x32.png"
  >
  <title>Frontend Mentor | Blog preview card</title>
  <link
    rel="stylesheet"
    href="./styles/style.css"
  >
</head>
<body>
<main>
  <div class="card">
    <div class="card__image-wrapper">
      <img
        class="card__image"
        src="./assets/images/illustration-article.svg"
        alt="Article illustration: abstract shapes and code symbols"
        width="336"
        height="200"
        loading="lazy"
      />
    </div>
    <div class="card__body">
      <span class="card__tag text-preset-3 text-preset-3--bold">Learning</span>
      <p class="card__date text-preset-3">Published
        <time datetime="2023-12-21">21 Dec 2023</time>
      </p>
      <h1 class="card__title text-preset-1">
        <a
          class="card__link"
          href="#"
        >
          HTML & CSS foundations
        </a>
      </h1>
      <p class="card__description text-preset-2">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <footer class="card__footer">
      <img
        class="card__author-avatar"
        src="./assets/images/image-avatar.webp"
        alt="Greg Hooper avatar"
        width="32"
        height="32"
        loading="lazy"
      />
      <span class="card__author-name text-preset-3 text-preset-3--bold">Greg Hooper</span>
    </footer>
  </div>
</main>
</body>
</html>
