<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  > <!-- displays site properly based on user's device -->

  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="./assets/images/favicon-32x32.png"
  >

  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>
<body>
<main>
  <div class="card">
    <img
      class="card__image"
      src="./assets/images/illustration-article.svg"
      alt="Article illustration: abstract shapes and code symbols"
      width="336"
      height="200"
      loading="lazy"
    />
    <div class="card__body">
      <span class="card__tag">Learning</span>
      <p class="card__date">Published
        <time datetime="2023-12-21">21 Dec 2023</time>
      </p>
      <h1 class="card__title">
        <a
          class="card__link"
          href="#"
        >
          HTML & CSS foundations
        </a>
      </h1>
      <p class="card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <footer class="card__footer">
      <img
        class="card__author-avatar"
        src="./assets/images/image-avatar.webp"
        alt="Greg Hooper avatar"
        width="32"
        height="32"
        loading="lazy"
      />
      <span class="card__author-name">Greg Hooper</span>
    </footer>
  </div>
</main>
</body>
</html>
